<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Каталог</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <h1>Мой Магазин</h1>
            <p>Лучшие товары по лучшим ценам</p>
            
            <!-- Поле поиска -->
            <input type="text" id="searchInput" placeholder="Поиск товара..." onkeyup="filterProducts()">
            
            <!-- Кнопки категорий -->
            <div class="categories">
                <button onclick="filterCategory('all')" class="active">Все</button>
                <button onclick="filterCategory('electronics')">Электроника</button>
                <button onclick="filterCategory('clothing')">Одежда</button>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Сюда JavaScript будет вставлять товары -->
        <div id="catalog-grid" class="catalog-grid"></div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Мой Каталог на GitHub Pages</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
