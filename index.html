<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Каталог</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <h1>Мой Каталог</h1>
            <p>Ознакомьтесь с нашими товарами и ценами</p>
            
            <input type="text" id="searchInput" placeholder="Поиск товара..." onkeyup="filterProducts()">
            
            <div class="categories">
                <button onclick="filterCategory('all')" class="active">Все</button>
                <button onclick="filterCategory('electronics')">Электроника</button>
                <button onclick="filterCategory('clothing')">Одежда</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="catalog-grid" class="catalog-grid"></div>
    </main>

    <!-- Модальное окно для просмотра фото -->
    <div id="photoModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            
            <div class="modal-body">
                <!-- Левая часть: Галерея -->
                <div class="modal-gallery-section">
                    <div class="modal-gallery">
                        <button class="gallery-nav prev" onclick="changePhoto(-1)">&#10094;</button>
                        <img id="modalImage" src="" alt="Фото товара">
                        <button class="gallery-nav next" onclick="changePhoto(1)">&#10095;</button>
                    </div>
                    <div class="modal-thumbnails" id="modalThumbnails"></div>
                </div>
                
                <!-- Правая часть: Информация -->
                <div class="modal-info-section">
                    <div class="modal-header">
                        <h2 id="modalTitle">Название товара</h2>
                        <p id="modalPrice">0 ₽</p>
                    </div>
                    
                    <div class="modal-description">
                        <h3>Описание</h3>
                        <p id="modalDesc">Описание товара</p>
                    </div>
                    
                    <div class="modal-contacts">
                        <h3>Контакты для заказа</h3>
                        <p>📞 +7 (999) 000-00-00</p>
                        <p>✉️ info@example.com</p>
                        <p>💬 Telegram: @username</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2024 Мой Каталог на GitHub Pages</p>
            <p>📞 Телефон: +7 (999) 000-00-00 | ✉️ Email: info@example.com</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
